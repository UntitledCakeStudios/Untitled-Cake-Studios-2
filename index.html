<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
:root{
  --text-brown:#5A3825;
  --ui-orange:#FCD6A5;
}

html, body {
  margin:0;
  padding:0;
  height:100%;
  overflow:hidden; /* 🔥 kills native scroll */
  font-family:'Fredoka One', cursive;
}

/* 🔥 PERFECT BACKGROUND (NEVER MOVES, NEVER REPAINTS) */
.bg {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:-1;
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
  will-change:transform;
  transform:translateZ(0);
}

body.light .bg{
  background-image:url('https://i.postimg.cc/zfH5wy4C/360-F-176015185-m-PGNca-L7Wyg-UCaa-NWR5nhi-C08H4tbo-BE-(1).jpg');
}

body.dark .bg{
  background-image:url('https://i.postimg.cc/5tVpgGRD/360-F-515248017-Oym-O6Gwhm-D6Joyw-Rfe-Gfr-Z99i8Cx9dt1.jpg?s=612x612&w=0&k=20&c=v8RrJ81Wqj3FEMEIm0oQF5HERauDWB73n2EDy01ukOs=');
}

/* 🔥 CUSTOM SCROLL SYSTEM */
#viewport {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  overflow:hidden;
}

#content {
  position:absolute;
  top:0;
  left:0;
  width:100%;
  will-change:transform;
}

/* UI */
.nav-bar{
  background:var(--ui-orange);
  border:4px solid var(--text-brown);
  border-radius:20px;
  padding:10px;
  display:flex;
  gap:10px;
  justify-content:center;
  flex-wrap:wrap;
  margin:20px auto;
  max-width:900px;
}

.tab-btn{
  padding:10px 15px;
  border-radius:12px;
  border:3px solid var(--text-brown);
  cursor:pointer;
  background:white;
}

.main-window{
  max-width:900px;
  margin:0 auto;
  background:white;
  border:4px solid var(--text-brown);
  border-radius:20px;
  padding:30px;
}

.section{
  margin-bottom:80px;
}

.footer{
  text-align:center;
  padding:40px;
}
</style>
</head>

<body class="light">

<div class="bg"></div>

<div id="viewport">
  <div id="content">

    <div class="nav-bar">
      <button class="tab-btn" onclick="toggleTheme()">Toggle Theme</button>
    </div>

    <div class="main-window section">
      <h1>Career</h1>
      <p>My GitHub-based development journey...</p>
    </div>

    <div class="main-window section">
      <h1>About</h1>
      <p>Developer info section...</p>
    </div>

    <div class="main-window section">
      <h1>History</h1>
      <p>Studio history...</p>
    </div>

    <div class="main-window section">
      <h1>Portfolio</h1>
      <p>Projects and tools...</p>
    </div>

    <div class="footer">
      © 2026 Studio
    </div>

  </div>
</div>

<script>
let targetY = 0;
let currentY = 0;

const content = document.getElementById("content");

function updateScroll(){
  currentY += (targetY - currentY) * 0.08; // smooth lerp
  content.style.transform = `translateY(${-currentY}px)`;
  requestAnimationFrame(updateScroll);
}

window.addEventListener("wheel", (e)=>{
  targetY += e.deltaY;
  targetY = Math.max(0, targetY);
});

updateScroll();

/* theme */
function toggleTheme(){
  document.body.classList.toggle("dark");
}
</script>

</body>
</html>
